name: Build bootJar and upload to Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build bootJar
        run: ./gradlew clean bootJar

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          JAR_PATH="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
          if [ -z "$JAR_PATH" ]; then
            echo "bootJar output not found"
            exit 1
          fi

          ASSET_PATH="build/libs/lukosBot2-${{ github.event.release.tag_name }}.jar"
          cp "$JAR_PATH" "$ASSET_PATH"

          echo "path=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload JAR to current release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.asset.outputs.path }}
